<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>我的自我介紹</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        .card{
            background: white;
            width: 400px;
            margin: 80px auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        img{
            width: 120px;
            border-radius: 50%;
        }
        h1{
            color: #333;
        }
        p{
            color: #666;
        }
        .btn{
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }
        .btn:hover{
            background: #45a049;
        }
    </style>
</head>

<body>

<div class="card">
    <img src="https://via.placeholder.com/120" alt="我的照片">
    <h1>你好，我是XXX</h1>
    <p>年齡：XX歲</p>
    <p>興趣：打遊戲、看電影、學程式</p>
    <p>我正在學習 HTML、CSS 和 JavaScript，希望未來能成為工程師！</p>

    <a class="btn" href="#">聯絡我</a>
</div>

</body>
</html>
